<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#0d0d18"/>
    </linearGradient>

    <!-- Arrow markers -->
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4285f4"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f38020"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#34a853"/>
    </marker>
    <marker id="arrow-purple" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#9c59e8"/>
    </marker>
    <marker id="arrow-white" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="rgba(255,255,255,0.35)"/>
    </marker>
    <marker id="arrow-blue-rev" markerWidth="8" markerHeight="8" refX="1" refY="3" orient="auto">
      <path d="M8,0 L8,6 L0,3 z" fill="#4285f4"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g stroke="rgba(255,255,255,0.025)" stroke-width="1">
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="500"/>
    <line x1="400" y1="0" x2="400" y2="500"/>
    <line x1="600" y1="0" x2="600" y2="500"/>
  </g>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-size="16" font-weight="600" fill="white" letter-spacing="0.5">Past, Live — System Architecture</text>
  <text x="400" y="55" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.4)" letter-spacing="0.3">5 Gemini API calls per session</text>

  <!-- ═══════════════════════════════════════════ -->
  <!--  ROW 1: BROWSER (left) + BACKEND (center)  -->
  <!-- ═══════════════════════════════════════════ -->

  <!-- BROWSER box — Cloudflare orange accent -->
  <rect x="30" y="80" width="200" height="140" rx="10" fill="rgba(243,128,32,0.07)" stroke="#f38020" stroke-width="1.5"/>
  <rect x="30" y="80" width="200" height="28" rx="10" fill="rgba(243,128,32,0.18)"/>
  <rect x="30" y="96" width="200" height="12" fill="rgba(243,128,32,0.18)"/>
  <text x="130" y="99" text-anchor="middle" font-size="11" font-weight="700" fill="#f38020" letter-spacing="0.5">BROWSER</text>
  <text x="130" y="131" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.8)">Astro 5 + Svelte 5</text>
  <text x="130" y="150" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.45)">Mic capture · Audio playback</text>
  <text x="130" y="167" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.45)">Transcript · Choice cards</text>
  <text x="130" y="184" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.45)">Text input · Scene images</text>
  <!-- Cloudflare label -->
  <rect x="52" y="204" width="156" height="18" rx="4" fill="rgba(243,128,32,0.12)"/>
  <text x="130" y="216" text-anchor="middle" font-size="9.5" fill="#f38020" font-weight="600">☁ Cloudflare Workers</text>

  <!-- BACKEND box — Google blue accent -->
  <rect x="300" y="80" width="210" height="140" rx="10" fill="rgba(66,133,244,0.07)" stroke="#4285f4" stroke-width="1.5"/>
  <rect x="300" y="80" width="210" height="28" rx="10" fill="rgba(66,133,244,0.18)"/>
  <rect x="300" y="96" width="210" height="12" fill="rgba(66,133,244,0.18)"/>
  <text x="405" y="99" text-anchor="middle" font-size="11" font-weight="700" fill="#4285f4" letter-spacing="0.5">BACKEND</text>
  <text x="405" y="131" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.8)">Hono / TypeScript</text>
  <text x="405" y="150" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.45)">WebSocket relay · Tool call handler</text>
  <text x="405" y="167" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.45)">Scenario prompts · Profile I/O</text>
  <text x="405" y="184" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.45)">Session timer · Audio queue</text>
  <!-- Cloud Run label -->
  <rect x="322" y="204" width="166" height="18" rx="4" fill="rgba(66,133,244,0.12)"/>
  <text x="405" y="216" text-anchor="middle" font-size="9.5" fill="#4285f4" font-weight="600">☁ Google Cloud Run</text>

  <!-- CLERK box — purple accent, top right -->
  <rect x="580" y="80" width="185" height="78" rx="10" fill="rgba(156,89,232,0.07)" stroke="#9c59e8" stroke-width="1.5"/>
  <rect x="580" y="80" width="185" height="28" rx="10" fill="rgba(156,89,232,0.18)"/>
  <rect x="580" y="96" width="185" height="12" fill="rgba(156,89,232,0.18)"/>
  <text x="672" y="99" text-anchor="middle" font-size="11" font-weight="700" fill="#9c59e8" letter-spacing="0.5">CLERK</text>
  <text x="672" y="131" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.8)">Auth + JWT</text>
  <text x="672" y="149" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.45)">Anonymous-first sign-in</text>

  <!-- ═══════════════════════════ -->
  <!--  ROW 2: GEMINI LIVE         -->
  <!-- ═══════════════════════════ -->

  <!-- Gemini Live API box — Google blue, prominent -->
  <rect x="300" y="270" width="210" height="84" rx="10" fill="rgba(66,133,244,0.1)" stroke="#4285f4" stroke-width="2"/>
  <rect x="300" y="270" width="210" height="28" rx="10" fill="rgba(66,133,244,0.22)"/>
  <rect x="300" y="286" width="210" height="12" fill="rgba(66,133,244,0.22)"/>
  <text x="405" y="289" text-anchor="middle" font-size="11" font-weight="700" fill="#4285f4" letter-spacing="0.5">GEMINI LIVE API</text>
  <text x="405" y="315" text-anchor="middle" font-size="10.5" fill="rgba(255,255,255,0.8)">gemini-2.5-flash-native-audio</text>
  <text x="405" y="333" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.45)">Real-time voice · VAD · Affective dialog</text>
  <!-- Call 4 badge -->
  <rect x="446" y="265" width="54" height="16" rx="8" fill="#4285f4"/>
  <text x="473" y="276" text-anchor="middle" font-size="9" font-weight="700" fill="white">Call #4</text>

  <!-- ═══════════════════════════ -->
  <!--  ROW 3: GEMINI FLASH + IMG  -->
  <!-- ═══════════════════════════ -->

  <!-- Gemini Flash box — green accent -->
  <rect x="30" y="390" width="210" height="90" rx="10" fill="rgba(52,168,83,0.07)" stroke="#34a853" stroke-width="1.5"/>
  <rect x="30" y="390" width="210" height="28" rx="10" fill="rgba(52,168,83,0.18)"/>
  <rect x="30" y="406" width="210" height="12" fill="rgba(52,168,83,0.18)"/>
  <text x="135" y="409" text-anchor="middle" font-size="11" font-weight="700" fill="#34a853" letter-spacing="0.5">GEMINI FLASH</text>
  <text x="135" y="436" text-anchor="middle" font-size="10.5" fill="rgba(255,255,255,0.8)">gemini-3-flash-preview</text>
  <text x="135" y="454" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.45)">Preview JSON · Post-call summary</text>
  <text x="135" y="471" text-anchor="middle" font-size="9.5" fill="rgba(52,168,83,0.7)">Calls #1 and #5</text>

  <!-- Gemini 3.1 Image box — Google yellow/amber accent -->
  <rect x="300" y="390" width="210" height="90" rx="10" fill="rgba(251,188,4,0.07)" stroke="#fbbc04" stroke-width="1.5"/>
  <rect x="300" y="390" width="210" height="28" rx="10" fill="rgba(251,188,4,0.18)"/>
  <rect x="300" y="406" width="210" height="12" fill="rgba(251,188,4,0.18)"/>
  <text x="405" y="409" text-anchor="middle" font-size="11" font-weight="700" fill="#fbbc04" letter-spacing="0.5">GEMINI 3.1 IMAGE</text>
  <text x="405" y="436" text-anchor="middle" font-size="10.5" fill="rgba(255,255,255,0.8)">gemini-3.1-flash-image-preview</text>
  <text x="405" y="454" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.45)">Character portraits · Scene images</text>
  <text x="405" y="471" text-anchor="middle" font-size="9.5" fill="rgba(251,188,4,0.7)">Calls #2 and #3</text>

  <!-- Firestore box — red/coral accent -->
  <rect x="570" y="390" width="200" height="90" rx="10" fill="rgba(234,67,53,0.07)" stroke="#ea4335" stroke-width="1.5"/>
  <rect x="570" y="390" width="200" height="28" rx="10" fill="rgba(234,67,53,0.18)"/>
  <rect x="570" y="406" width="200" height="12" fill="rgba(234,67,53,0.18)"/>
  <text x="670" y="409" text-anchor="middle" font-size="11" font-weight="700" fill="#ea4335" letter-spacing="0.5">FIRESTORE</text>
  <text x="670" y="436" text-anchor="middle" font-size="10.5" fill="rgba(255,255,255,0.8)">past-live-490122 · EU eur3</text>
  <text x="670" y="454" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.45)">Student profiles · Session history</text>
  <text x="670" y="471" text-anchor="middle" font-size="9.5" fill="rgba(234,67,53,0.7)">Cross-session memory</text>

  <!-- ═══════════════════════════════ -->
  <!--  CONNECTIONS                    -->
  <!-- ═══════════════════════════════ -->

  <!-- Browser ↔ Backend: WebSocket (bidirectional, center) -->
  <!-- Right arrow (browser → backend) -->
  <line x1="231" y1="142" x2="298" y2="142" stroke="#f38020" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-orange)"/>
  <!-- Left arrow (backend → browser) -->
  <line x1="299" y1="158" x2="232" y2="158" stroke="#4285f4" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-blue-rev)"/>
  <!-- Label -->
  <rect x="237" y="133" width="56" height="34" rx="4" fill="rgba(0,0,0,0.55)"/>
  <text x="265" y="145" text-anchor="middle" font-size="8.5" fill="rgba(255,255,255,0.7)">WebSocket</text>
  <text x="265" y="158" text-anchor="middle" font-size="7.5" fill="rgba(255,255,255,0.4)">audio · text</text>
  <text x="265" y="169" text-anchor="middle" font-size="7.5" fill="rgba(255,255,255,0.4)">tool calls</text>

  <!-- Backend ↔ Gemini Live: WebSocket -->
  <line x1="405" y1="222" x2="405" y2="268" stroke="#4285f4" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <!-- Label -->
  <rect x="415" y="236" width="70" height="22" rx="4" fill="rgba(0,0,0,0.55)"/>
  <text x="450" y="247" text-anchor="middle" font-size="8.5" fill="rgba(255,255,255,0.7)">WebSocket</text>
  <text x="450" y="258" text-anchor="middle" font-size="7.5" fill="rgba(255,255,255,0.4)">real-time voice</text>

  <!-- Backend → Gemini Flash -->
  <!-- Angled line from backend bottom-left down to Gemini Flash top-right -->
  <line x1="340" y1="222" x2="220" y2="388" stroke="#34a853" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <!-- Label -->
  <rect x="233" y="290" width="80" height="30" rx="4" fill="rgba(0,0,0,0.55)"/>
  <text x="273" y="302" text-anchor="middle" font-size="8" fill="rgba(255,255,255,0.7)">preview JSON</text>
  <text x="273" y="314" text-anchor="middle" font-size="8" fill="rgba(255,255,255,0.4)">post-call summary</text>

  <!-- Backend → Gemini 3.1 Image -->
  <line x1="405" y1="356" x2="405" y2="388" stroke="#fbbc04" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <!-- Label -->
  <rect x="414" y="364" width="70" height="20" rx="4" fill="rgba(0,0,0,0.55)"/>
  <text x="449" y="374" text-anchor="middle" font-size="8.5" fill="rgba(255,255,255,0.7)">portraits · scenes</text>

  <!-- Backend → Firestore: curved right -->
  <path d="M510,180 Q620,180 670,388" fill="none" stroke="#ea4335" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-blue)"/>
  <!-- Label -->
  <rect x="617" y="265" width="86" height="22" rx="4" fill="rgba(0,0,0,0.55)"/>
  <text x="660" y="275" text-anchor="middle" font-size="8.5" fill="rgba(255,255,255,0.7)">profiles · sessions</text>
  <text x="660" y="286" text-anchor="middle" font-size="7.5" fill="rgba(255,255,255,0.4)">read / write</text>

  <!-- Clerk → Backend JWT -->
  <line x1="580" y1="125" x2="511" y2="125" stroke="#9c59e8" stroke-width="1.5" marker-end="url(#arrow-purple)"/>
  <!-- Label -->
  <rect x="521" y="113" width="50" height="16" rx="4" fill="rgba(0,0,0,0.55)"/>
  <text x="546" y="124" text-anchor="middle" font-size="8.5" fill="rgba(255,255,255,0.6)">JWT validate</text>

  <!-- Clerk → Browser auth UI (dashed down-left) -->
  <path d="M580,145 Q520,145 230,145" fill="none" stroke="#9c59e8" stroke-width="1" stroke-dasharray="4,4" marker-end="url(#arrow-purple)"/>
  <!-- label overlaps WebSocket area — skip, covered -->

  <!-- ═══════════════════════════════ -->
  <!--  CALL SEQUENCE LEGEND           -->
  <!-- ═══════════════════════════════ -->

  <rect x="570" y="185" width="200" height="175" rx="8" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="670" y="204" text-anchor="middle" font-size="10" font-weight="700" fill="rgba(255,255,255,0.6)" letter-spacing="0.5">SESSION CALLS</text>

  <!-- Call 1 -->
  <circle cx="592" cy="222" r="7" fill="#34a853"/>
  <text x="592" y="226" text-anchor="middle" font-size="8" font-weight="700" fill="white">1</text>
  <text x="606" y="223" font-size="9.5" fill="rgba(255,255,255,0.8)">Preview JSON</text>
  <text x="606" y="234" font-size="8.5" fill="rgba(255,255,255,0.4)">Gemini Flash</text>

  <!-- Call 2 -->
  <circle cx="592" cy="252" r="7" fill="#fbbc04"/>
  <text x="592" y="256" text-anchor="middle" font-size="8" font-weight="700" fill="white">2</text>
  <text x="606" y="253" font-size="9.5" fill="rgba(255,255,255,0.8)">Scene image</text>
  <text x="606" y="264" font-size="8.5" fill="rgba(255,255,255,0.4)">Gemini 3.1 Image</text>

  <!-- Call 3 -->
  <circle cx="592" cy="282" r="7" fill="#fbbc04"/>
  <text x="592" y="286" text-anchor="middle" font-size="8" font-weight="700" fill="white">3</text>
  <text x="606" y="283" font-size="9.5" fill="rgba(255,255,255,0.8)">Portrait</text>
  <text x="606" y="294" font-size="8.5" fill="rgba(255,255,255,0.4)">Gemini 3.1 Image</text>

  <!-- Call 4 -->
  <circle cx="592" cy="312" r="7" fill="#4285f4"/>
  <text x="592" y="316" text-anchor="middle" font-size="8" font-weight="700" fill="white">4</text>
  <text x="606" y="313" font-size="9.5" fill="rgba(255,255,255,0.8)">Voice session</text>
  <text x="606" y="324" font-size="8.5" fill="rgba(255,255,255,0.4)">Gemini Live API</text>

  <!-- Call 5 -->
  <circle cx="592" cy="342" r="7" fill="#34a853"/>
  <text x="592" y="346" text-anchor="middle" font-size="8" font-weight="700" fill="white">5</text>
  <text x="606" y="343" font-size="9.5" fill="rgba(255,255,255,0.8)">Post-call summary</text>
  <text x="606" y="354" font-size="8.5" fill="rgba(255,255,255,0.4)">Gemini Flash</text>

  <!-- Legend color key -->
  <line x1="583" y1="370" x2="600" y2="370" stroke="#f38020" stroke-width="2"/>
  <text x="605" y="373" font-size="8.5" fill="rgba(255,255,255,0.4)">Cloudflare</text>
  <line x1="650" y1="370" x2="667" y2="370" stroke="#4285f4" stroke-width="2"/>
  <text x="672" y="373" font-size="8.5" fill="rgba(255,255,255,0.4)">Google</text>
  <line x1="583" y1="384" x2="600" y2="384" stroke="#9c59e8" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="605" y="387" font-size="8.5" fill="rgba(255,255,255,0.4)">Auth JWT</text>
</svg>
